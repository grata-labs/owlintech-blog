baseURL: https://owlintech.com/
languageCode: en-us
title: Owl In Tech
theme: PaperMod
enableRobotsTXT: true

paginate: 10

params:
  env: production
  description: "Tech reviews, guides, and more"
  author: Michael Smith

  socialIcons:
    - name: github
      url: "https://github.com/grata-labs"

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: false
  defaultTheme: auto
  disableThemeToggle: false

  assets:
    favicon: /favicon.ico
    favicon16x16: /favicon-16x16.png
    favicon32x32: /favicon-32x32.png
    apple_touch_icon: /apple-touch-icon.png
    disableFingerprinting: false

menu:
  main:
    - identifier: archive
      name: Archive
      url: /archives/
      weight: 10
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 20
    - identifier: search
      name: Search
      url: /search/
      weight: 30
    - identifier: about
      name: About
      url: /about/
      weight: 40

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true
